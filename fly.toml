# Fly.io config for the Fastify API.
# Deploy: fly deploy --config fly.toml
# Secrets: fly secrets set AUTH0_DOMAIN=... AUTH0_AUDIENCE=... DATABASE_URL=...

app            = "schissel-api"
primary_region = "iad"

[build]
  dockerfile = "packages/api/Dockerfile"

[env]
  PORT     = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port        = 3001
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
